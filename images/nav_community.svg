<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" shape-rendering="crispEdges">
  <!-- top-left speech bubble body -->
  <rect x="0" y="1" width="10" height="7"/>
  <!-- top-left bubble tail -->
  <rect x="1" y="8" width="2" height="2"/>
  <rect x="1" y="10" width="1" height="1"/>
  <!-- dots inside top bubble -->
  <rect x="2" y="3" width="1" height="1" fill="var(--bg,#f5f0e8)" opacity="0.5"/>
  <rect x="4" y="3" width="1" height="1" fill="var(--bg,#f5f0e8)" opacity="0.5"/>
  <rect x="6" y="3" width="1" height="1" fill="var(--bg,#f5f0e8)" opacity="0.5"/>
  <!-- bottom-right speech bubble body -->
  <rect x="5" y="7" width="11" height="7"/>
  <!-- bottom-right bubble tail -->
  <rect x="13" y="14" width="2" height="1"/>
  <rect x="14" y="15" width="1" height="1"/>
  <!-- dots inside bottom bubble -->
  <rect x="7"  y="10" width="1" height="1" fill="var(--bg,#f5f0e8)" opacity="0.5"/>
  <rect x="9"  y="10" width="1" height="1" fill="var(--bg,#f5f0e8)" opacity="0.5"/>
  <rect x="11" y="10" width="1" height="1" fill="var(--bg,#f5f0e8)" opacity="0.5"/>
</svg>
