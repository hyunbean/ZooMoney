<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" shape-rendering="crispEdges">
  <!-- chimney -->
  <rect x="9" y="0" width="2" height="4"/>
  <!-- roof steps -->
  <rect x="8"  y="4"  width="4" height="1"/>
  <rect x="7"  y="5"  width="6" height="1"/>
  <rect x="6"  y="6"  width="8" height="1"/>
  <rect x="5"  y="7"  width="10" height="1"/>
  <rect x="4"  y="8"  width="12" height="1"/>
  <rect x="3"  y="9"  width="14" height="1"/>
  <!-- walls left -->
  <rect x="3"  y="10" width="3" height="6"/>
  <!-- walls right -->
  <rect x="10" y="10" width="4" height="6"/>
  <!-- top wall strip -->
  <rect x="3"  y="10" width="14" height="2"/>
  <!-- door -->
  <rect x="7"  y="12" width="3" height="4"/>
  <!-- window left -->
