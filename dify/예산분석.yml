    - data:
        code: "import json, re\n\ndef main(llm_output: str, monthly_target: str) ->\
          \ dict:\n    m = re.search(r'월 저축 목표.*?(\\d[\\d,]+)', monthly_target)\n\
          \    target = int(m.group(1).replace(',', '')) if m else 0\n\n    jm = re.search(r'```json\\\
          s*([\\s\\S]*?)\\s*```', llm_output)\n    if not jm:\n        return {\"\
          result\": llm_output}\n    budgets = json.loads(jm.group(1))\n\n    gap\
          \ = target - sum(b['current'] - b['suggested'] for b in budgets)\n\n   \
          \ if gap > 0:\n        # 유연한 카테고리만 대상 (교통 제외)\n        flexible = [b for\
          \ b in budgets if b['id'] != 'transport']\n        total_flex = sum(b['suggested']\
          \ for b in flexible)\n\n        for b in flexible:\n            if total_flex\
          \ <= 0:\n                break\n            # 현재 suggested 비율만큼 분담\n   \
          \         share = round(gap * b['suggested'] / total_flex)\n           \
          \ cut = min(share, b['suggested'] - 10000)  # 최소 10,000원은 남김\n         \
          \   if cut > 0:\n                b['suggested'] -= cut\n               \
          \ gap -= cut\n\n        # 그래도 남으면 flexible 중 가장 큰 것에서 처리\n        if gap\
          \ > 0:\n            largest = max(flexible, key=lambda b: b['suggested'])\n\
          \            largest['suggested'] = max(10000, largest['suggested'] - gap)\n\
          \n    return {\"result\": \"```json\\n\" + json.dumps(budgets, ensure_ascii=False)\
          \ + \"\\n```\"}"
