    - data:
        code: "def main(sys_query: str) -> dict:\n    import re\n\n    lines = sys_query.split('\\\
          n')\n    cats = {'food': 0, 'cafe': 0, 'transport': 0, 'shopping': 0, 'entertain':\
          \ 0, 'etc': 0}\n    found = False\n\n    for line in lines:\n        m =\
          \ re.search(r'.+?\\s*\\|\\s*(.+?)\\s*\\|\\s*([\\d,]+)원', line)\n       \
          \ if not m:\n            continue\n        merchant = m.group(1).strip()\n\
          \        amount = int(m.group(2).replace(',', ''))\n        found = True\n\
          \n        if re.search(r'커피|카페|메가엠지씨|컴포즈|스타벅스|이디야', merchant):\n       \
          \     cats['cafe'] += amount\n        elif re.search(r'맥도날드|버거킹|면옥|쌍용각|배달의민족|BHC|bhc|치킨|타코|앤티앤|콩게미',\
          \ merchant):\n            cats['food'] += amount\n        elif re.search(r'주유소|철도|버스|지하철',\
          \ merchant):\n            cats['transport'] += amount\n        elif re.search(r'메가박스|롯데시네마|디트릭스',\
          \ merchant):\n            cats['entertain'] += amount\n        elif re.search(r'무신사|유니클로|무지|MUJI|다이소|이마트|GS25|씨유|CU',\
          \ merchant):\n            cats['shopping'] += amount\n        else:\n  \
          \          cats['etc'] += amount\n\n    if not found:\n        return {'has_data':\
          \ False, 'summary': '', 'top_category': ''}\n\n    cat_names = {'food':'식비','cafe':'카페','transport':'교통','shopping':'쇼핑','entertain':'엔터','etc':'기타'}\n\
          \    total = sum(cats.values())\n    sorted_cats = sorted(cats.items(),\
          \ key=lambda x: x[1], reverse=True)\n    sorted_cats = [(k, v) for k, v\
          \ in sorted_cats if v > 0]\n    if not sorted_cats:\n        return {'has_data': False, 'summary': '', 'top_category': ''}\n\n    top_cat = cat_names[sorted_cats[0][0]]\n\
          \    summary = ', '.join([f\"{cat_names[k]}: {v:,}원 ({round(v/total*100)}%)\"\
          \ for k, v in sorted_cats])\n\n    return {'has_data': True, 'summary':\
          \ summary, 'top_category': top_cat}"
        code_language: python3
        outputs:
          has_data:
            children: null
            type: boolean
          summary:
            children: null
            type: string
          top_category:
            children: null
            type: string
        selected: false
        title: 코드
